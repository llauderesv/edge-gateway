apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: edge-gateway-root
  namespace: argocd
spec:
  project: edge-gateway
  source:
    repoURL: https://github.com/llauderesv/edge-gateway.git
    targetRevision: HEAD
    path: apps/platforms
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true