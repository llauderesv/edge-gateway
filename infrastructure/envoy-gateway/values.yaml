# Parent-chart values. Subchart config lives under gateway-helm.
gatewayClass:
  name: eg
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
  # Linked to EnvoyProxy below (namespace filled at render from release ns)
  parametersRef:
    group: gateway.envoyproxy.io
    kind: EnvoyProxy
    name: eg
  annotations: {}

envoyProxy:
  name: eg
  service:
    # Override per env (ClusterIP for local/minikube, LoadBalancer for cloud)
    type: LoadBalancer
