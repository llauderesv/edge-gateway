apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: edge
  namespace: edge-system
spec:
  gatewayClassName: envoy
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "qa.api.company.com"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: qa-tls-cert
      allowedRoutes:
        namespaces:
          from: All
