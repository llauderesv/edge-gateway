apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "edge-service.fullname" . }}
  namespace: {{ .Values.service.namespace }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Values.gateway.namespace }}
  hostnames:
    {{- range .Values.route.hostnames }}
    - {{ . | quote }}
    {{- end }}
  rules:
    - matches:
        - path:
            type: {{ .Values.route.pathType }}
            value: {{ .Values.route.path }}
      backendRefs:
        {{- if eq .Values.backend.type "kubernetes" }}
        - group: ""
          kind: Service
          name: {{ .Values.backend.service.name }}
          port: {{ .Values.backend.service.port }}
        {{- else if eq .Values.backend.type "external" }}
        - group: gateway.networking.k8s.io
          kind: Backend
          name: {{ include "edge-service.backendName" . }}
        {{- end }}